name: GrayscaleTimer
options:
  createIntermediateGroups: true
settings:
  base:
    APP_GROUP_IDENTIFIER: group.com.jeraldyuan.GrayscaleTimer
    CURRENT_PROJECT_VERSION: 1
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    MARKETING_VERSION: 1.0
    SWIFT_VERSION: 6.0
schemes:
  GrayscaleTimer:
    build:
      targets:
        GrayscaleTimer: all
        GrayscaleTimerWidgetExtension: [build]
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  GrayscaleTimerWidgetExtension:
    build:
      targets:
        GrayscaleTimerWidgetExtension: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
targets:
  GrayscaleTimer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Services
      - path: Persistence
      - path: Features
      - path: Shared
    dependencies:
      - target: GrayscaleTimerWidgetExtension
        embed: true
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: App/GrayscaleTimer.entitlements
        INFOPLIST_FILE: App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.jeraldyuan.GrayscaleTimer
        PRODUCT_NAME: Grayscale Timer
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1"
  GrayscaleTimerWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Widget
      - path: Shared
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: YES
        CODE_SIGN_ENTITLEMENTS: Widget/GrayscaleTimerWidget.entitlements
        INFOPLIST_FILE: Widget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.jeraldyuan.GrayscaleTimer.Widget
        PRODUCT_NAME: Grayscale Timer Widget
        SKIP_INSTALL: YES
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1"
